apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reef-relay.fullname" . }}
  labels:
    {{- include "reef-relay.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reef-relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reef-relay.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: relay
          image: {{ include "reef-relay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "reef-relay.databaseEnv" . | nindent 12 }}
            - name: PUBLIC_ORIGIN
              value: {{ .Values.publicOrigin | quote }}
            - name: EMAIL_FROM
              value: {{ .Values.emailFrom | quote }}
            - name: CANONICAL_SITE_HOST
              value: {{ .Values.canonicalSiteHost | quote }}
            - name: SITE_REDIRECT_HOSTS
              value: {{ join "," .Values.siteRedirectHosts | quote }}
            - name: TRUSTED_PROXY_CIDRS
              value: {{ join "," .Values.trustedProxyCidrs | quote }}
            - name: SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: SMTP_SECURE
              value: {{ ternary "1" "0" .Values.smtp.secure | quote }}
            {{- if .Values.smtp.user }}
            - name: SMTP_USER
              value: {{ .Values.smtp.user | quote }}
            {{- end }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.passwordKey }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
