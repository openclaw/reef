apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "reef-relay.fullname" . }}-migrate
  labels:
    {{- include "reef-relay.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        {{- include "reef-relay.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ include "reef-relay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "services/relay/dist/migrate.js"]
          env:
            {{- include "reef-relay.databaseEnv" . | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
